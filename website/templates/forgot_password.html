{% extends "base.html" %} {% block title %}Forgot Password{% endblock %} {% block content %}

<style>
    body {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        background-image: url("{{ url_for('static', filename='img/whitebackground.jpg') }}");
        color: black;
    }
    
    .btn-primary {
        background-color: black !important;
        border-color: black !important;
        color: whitesmoke;
        border-radius: 5px;
        font-size: 1.1rem;
    }
    
    .btn-primary:hover {
        color: white;
    }
</style>

<form method="POST">
    <br/>
    <h3 align="center">Reset your password</h3>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Enter new password" required>
    </div>

    <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
    </div>

    <div class="text-center mt-3">
        <button type="submit" class="btn btn-primary">Update Password</button>
    </div>

    <div class="text-center mt-3 mb-3">
        <a href="{{ url_for('auth.login') }}" class="back-button">Back to Login</a>
    </div>
</form>

{% endblock %}
